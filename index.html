<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAV — Science-backed supplements</title>
<meta name="description" content="The essentials. Nothing else. Launching soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600&family=EB+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0E0E0E;
    --white: #FFFFFF;
    --grey: #999999;
    --light: #E8E8E8;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    -webkit-font-smoothing: antialiased;
    opacity: 0;
    animation: pageIn 0.8s ease 0.1s forwards;
  }

  @keyframes pageIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .top { flex: 1; }
  .bottom { flex: 1; }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  /* LOGO */
  .logo-wrap {
    width: 100%;
    max-width: 400px;
    margin-bottom: 32px;
    animation: fadeUp 0.7s ease 0.2s both;
  }
  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--light);
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  /* TAGLINE — bigger on desktop */
  .tagline {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: clamp(18px, 2.2vw, 26px);
    color: var(--grey);
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 14px;
    animation: fadeUp 0.7s ease 0.35s both;
  }

  /* LAUNCHING SOON — bigger on desktop */
  .launching {
    font-weight: 300;
    font-size: clamp(11px, 1.1vw, 15px);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #CCCCCC;
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.7s ease 0.4s both;
  }

  .form-wrap {
    width: 100%;
    animation: fadeUp 0.7s ease 0.45s both;
  }

  .form-row {
    display: flex;
    border: 1px solid var(--light);
  }

  .email-input {
    flex: 1;
    padding: 14px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(13px, 1.2vw, 15px);
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--black);
    background: transparent;
    border: none;
    outline: none;
    min-width: 0;
  }

  .email-input::placeholder { color: #CCCCCC; }

  .submit-btn {
    padding: 14px 22px;
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(10px, 1vw, 12px);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.2s ease;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:active { background: #555; }

  .error-msg {
    display: none;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: #CC3333;
    text-align: center;
    margin-top: 8px;
  }

  .success-msg {
    display: none;
    text-align: center;
    padding: 14px 0;
  }
  .success-msg p {
    font-weight: 300;
    font-size: clamp(13px, 1.2vw, 15px);
    letter-spacing: 0.15em;
    color: var(--grey);
  }
  .success-msg span {
    display: block;
    font-size: clamp(10px, 0.9vw, 12px);
    letter-spacing: 0.1em;
    color: #BBBBBB;
    margin-top: 5px;
  }

  /* FOOTER */
  .footer {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding-bottom: 32px;
    flex-shrink: 0;
    animation: fadeUp 0.7s ease 0.55s both;
  }

  .footer-line {
    width: 1px;
    height: 28px;
    background: var(--light);
  }

  .social-row {
    display: flex;
    gap: 28px;
    align-items: center;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #AAAAAA;
    transition: color 0.2s ease;
  }
  .social-link:hover { color: var(--black); }

  .social-link svg {
    width: clamp(16px, 1.4vw, 20px);
    height: clamp(16px, 1.4vw, 20px);
    fill: currentColor;
    flex-shrink: 0;
  }

  .social-label {
    font-size: clamp(12px, 1.1vw, 15px);
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .footer-text {
    font-size: clamp(9px, 0.8vw, 11px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #DDDDDD;
  }

  /* Small screens */
  @media (max-height: 620px) {
    .logo-wrap { max-width: 300px; margin-bottom: 20px; }
    .tagline { font-size: 16px; margin-bottom: 10px; }
    .launching { font-size: 10px; margin-bottom: 22px; }
    .footer { gap: 10px; padding-bottom: 16px; }
    .footer-line { height: 18px; }
  }
</style>
</head>

<script>
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    const email = input.value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    errorMsg.style.display = 'none';
    if (!emailRegex.test(email)) {
      errorMsg.style.display = 'block';
      input.focus();
      return;
    }
    btn.textContent = '...';
    btn.style.pointerEvents = 'none';
    fetch('https://formspree.io/f/YOUR_FORM_ID', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(() => showSuccess())
    .catch(() => showSuccess());
  }
  function showSuccess() {
    document.getElementById('formRow').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  }
  document.getElementById('emailInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
